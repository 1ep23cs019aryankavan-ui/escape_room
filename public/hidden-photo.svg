<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="n">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.2"/>
      <feBlend mode="multiply"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#g)"/>
  <rect width="1200" height="700" filter="url(#n)" opacity="0.18"/>
  <circle cx="220" cy="180" r="120" fill="#64748b" opacity="0.2"/>
  <circle cx="980" cy="520" r="170" fill="#94a3b8" opacity="0.16"/>
  <text x="430" y="380" fill="#3f3f46" font-size="58" font-family="Verdana" opacity="0.65" transform="rotate(-9 430 380)">hackovers</text>
  <text x="150" y="660" fill="#cbd5e1" font-size="20" font-family="Verdana" opacity="0.5">Campus Forensics Gallery</text>
</svg>
